name: Konstantinos Pateras
tagline: Behavioural Sciences · Biostatistics · Evidence Synthesis
future_role: Upcoming role - Ass. Professor of Applied Statistics in Behavioural Sciences
profile_image: /images/profile.jpg
bio: Konstantinos Pateras is a statistician working at the intersection of applied statistics, behavioural sciences and biostatistics. His work focuses on Bayesian methods, evidence synthesis, small-population studies, public and one health applications and statistical tools that support transparent decision-making under limited or complex data. He develops and applies statistical methodology across clinical, epidemiological and behavioural research, with a strong interest in reproducible workflows and collaborative research networks.
highlights:
  - 27+ funded research and applied projects
  - 37 peer-reviewed publications - 10 as first/senior author
  - Main proposer and Action Chair Candidate for MAGNET COST Action
  - Teaching across AUEB, UTH, UU, UMCU and NKUA
  - Maintainer/contributor to 3 R tools
