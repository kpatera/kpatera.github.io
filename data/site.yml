publications:
  text: Selected publication highlights. Full publication list available through Google Scholar.

  featured:

    - title: Combined assessment of early and late-phase outcomes in orphan drug development
      journal: Statistics in Medicine (2021)
      image: /images/papers/orphan-drugs.svg
      summary: Bayesian methods for combining evidence across development phases in orphan drug research.

    - title: Prior distributions for variance parameters in a sparse-event meta-analysis of a few small trials
      journal: Pharmaceutical Statistics (2020)
      image: /images/papers/sparse-events.svg
      summary: Development and evaluation of prior distributions for sparse-event meta-analysis.

    - title: Participants' outcomes gone missing within a network of interventions
      journal: Statistics in Medicine (2019)
      image: /images/papers/network-meta.svg
      summary: Bayesian modelling strategies for missing outcomes in network meta-analysis.

    - title: Data generating models of dichotomous outcomes
      journal: Statistics in Medicine (2018)
      image: /images/papers/dichotomous.svg
      summary: Simulation frameworks for random-effects meta-analysis.

    - title: The convergence Epidemic Volatility Index as an early warning tool
      journal: Infectious Disease Modelling (2023)
      image: /images/papers/evi.svg
      summary: Early warning indicators for epidemic surveillance.

    - title: tPRiors
      journal: BMC Medical Research Methodology (2022)
      image: /images/papers/tpriors.svg
      summary: Prior elicitation and posterior distributions of true disease prevalence.
